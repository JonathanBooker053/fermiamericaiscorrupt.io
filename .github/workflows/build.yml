name: Build & Deploy

on:
  push:
    branches: [main, modular-architecture, texas-dem-campaign-style]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        network: [fermi]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm test
        env:
          NETWORK: ${{ matrix.network }}

      - run: npm run build
        env:
          NETWORK: ${{ matrix.network }}

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/${{ matrix.network }}
          destination_dir: ${{ matrix.network }}
